<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tag — UDS Component</title>
  <link rel="stylesheet" href="tag.css" />
  <style>
    body {
      font-family: sans-serif;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 2rem;
      background: #F7F6F0;
    }
    .demo-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
    }
    .demo-label {
      font-size: 12px;
      color: #6B6B68;
      width: 120px;
      flex-shrink: 0;
    }
    .demo-dark {
      background: #191916;
      padding: 1rem;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <!-- Style: Transparent (intended for dark/image backgrounds) -->
  <div class="demo-dark">
    <div class="demo-row">
      <span class="demo-label" style="color:#FCFBFA">Transparent</span>
      <button class="uds-tag uds-tag--transparent" type="button">Taxonomía</button>
      <button class="uds-tag uds-tag--transparent" type="button">Investigación</button>
      <button class="uds-tag uds-tag--transparent" type="button">Posgrado</button>
    </div>
  </div>

  <!-- Style: Taxonomy -->
  <div class="demo-row">
    <span class="demo-label">Taxonomy</span>
    <button class="uds-tag uds-tag--taxonomy" type="button">Taxonomía</button>
    <button class="uds-tag uds-tag--taxonomy" type="button">Investigación</button>
    <button class="uds-tag uds-tag--taxonomy" type="button">Posgrado</button>
  </div>

  <!-- Style: Special -->
  <div class="demo-row">
    <span class="demo-label">Special</span>
    <button class="uds-tag uds-tag--special" type="button">IA Uniandes</button>
    <button class="uds-tag uds-tag--special" type="button">Asistente</button>
    <button class="uds-tag uds-tag--special" type="button">Destacado</button>
  </div>

  <!-- Disabled states -->
  <div class="demo-row">
    <span class="demo-label">Disabled</span>
    <button class="uds-tag uds-tag--transparent" type="button" disabled>Taxonomía</button>
    <button class="uds-tag uds-tag--taxonomy" type="button" disabled>Taxonomía</button>
    <button class="uds-tag uds-tag--special" type="button" disabled>IA Uniandes</button>
  </div>

  <!-- Non-interactive display usage (span) -->
  <div class="demo-row">
    <span class="demo-label">Display only</span>
    <span class="uds-tag uds-tag--taxonomy" role="img" aria-label="Categoría: Investigación">Investigación</span>
    <span class="uds-tag uds-tag--special" role="img" aria-label="Categoría especial: IA Uniandes">IA Uniandes</span>
  </div>

</body>
</html>
